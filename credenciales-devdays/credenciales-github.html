<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Credenciales — GitHub Copilot Dev Days</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mona+Sans:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
<style>
  @page {
    size: A4;
    margin: 0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Mona Sans', 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-feature-settings: "ss01", "ss02";
    background: #f4f4f6;
  }

  .page {
    width: 21cm;
    height: 29.7cm;
    margin: 1cm auto;
    display: grid;
    grid-template-columns: repeat(3, 7cm);
    grid-template-rows: repeat(3, 9.9cm);
    background: white;
    box-shadow: 0 2px 20px rgba(0,0,0,0.12);
    justify-content: center;
    align-content: center;
    gap: 0;
  }

  @media print {
    body { background: white; }
    .page {
      margin: 0;
      box-shadow: none;
      page-break-after: always;
    }
    .toolbar { display: none !important; }
  }

  .credential {
    width: 7cm;
    height: 9.9cm;
    position: relative;
    overflow: hidden;
    background: #fff;
    color: #1a1a1a;
    border: 1px dashed #d0d0d0;
  }

  .corner {
    position: absolute;
    width: 16px;
    height: 16px;
    z-index: 2;
  }
  .corner-tl {
    top: 10px; left: 6px;
    border-top: 2px solid #1a1a1a;
    border-left: 2px solid #1a1a1a;
  }
  .corner-tr {
    top: 10px; right: 6px;
    border-top: 2px solid #1a1a1a;
    border-right: 2px solid #1a1a1a;
  }
  .corner-bl {
    bottom: 6px; left: 6px;
    border-bottom: 2px solid #1a1a1a;
    border-left: 2px solid #1a1a1a;
  }
  .corner-br {
    bottom: 6px; right: 6px;
    border-bottom: 2px solid #1a1a1a;
    border-right: 2px solid #1a1a1a;
  }

  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    width: 100%;
    height: 100%;
    padding: 1.2cm 0.5cm 0.45cm;
    justify-content: space-between;
    position: relative;
    z-index: 2;
  }

  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .github-mark { width: 52px; height: 52px; }

  .copilot-text { height: 18px; margin-top: 7px; }

  .event-name {
    font-size: 15pt;
    font-weight: 800;
    font-variant-ligatures: none;
    color: #0FBF3E;
    margin-top: 8px;
    line-height: 1.1;
  }

  .event-sub {
    font-size: 7pt;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #8534F3;
    font-weight: 600;
    margin-top: 3px;
  }

  .sep {
    width: 2cm;
    height: 0.5px;
    background: #1a1a1a;
  }

  .name-zone {
    width: 85%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .name-field {
    width: 100%;
    border-bottom: 1.2px solid #1a1a1a;
    min-height: 1.4cm;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px 4px;
    font-size: 13pt;
    font-weight: 600;
    font-variant-ligatures: none;
    color: #1a1a1a;
    line-height: 1.15;
    text-align: center;
    word-break: break-word;
  }

  .role-tag {
    font-size: 8.5pt;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #8534F3;
    font-weight: 600;
  }

  .event-info {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    font-size: 8.5pt;
    letter-spacing: 0.08em;
    color: #1a1a1a;
    font-weight: 400;
  }

  .event-info .date {
    font-weight: 700;
  }

  .foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    color: #1a1a1a;
    font-size: 6pt;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .toolbar {
    position: fixed;
    top: 15px;
    right: 15px;
    z-index: 100;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .toolbar button {
    padding: 8px 18px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
  }

  .btn-print { background: #222; color: #fff; }
  .btn-print:hover { background: #444; }

  .toolbar .hint {
    font-size: 11px;
    color: #666;
    max-width: 280px;
    line-height: 1.4;
  }
</style>
</head>
<body>

<div class="toolbar">
  <button class="btn-print" onclick="window.print()">Imprimir</button>
  <span class="hint">9 credenciales de 7.16&times;11 cm (vertical). Ajustar a p&aacute;gina al imprimir.</span>
</div>

<div class="page" id="page"></div>

<script>
const names = [
  "Abigail Ortiz",

  "Fabio Cuevas",

const page = document.getElementById('page');
names.forEach(name => {
  const card = document.createElement('div');
  card.className = 'credential';
  card.innerHTML = `
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div class="content">
      <div class="header">
        ${ghMark}
        ${copilotText}
        <div class="event-name">GitHub Copilot<br>Dev Days</div>
      </div>
      <div class="sep"></div>
      <div class="name-zone">
        <div class="name-field">${name}</div>
        <div class="role-tag">Participante</div>
      </div>
      <div class="sep"></div>
      <div class="event-info">
        <span class="date">25 de Abril, 2026</span>
        <span>Ciudad del Este, Paraguay</span>
        <span>Mi LAB · Plaza City</span>
      </div>
    </div>`;
  page.appendChild(card);
});
</script>

</body>
</html>
